<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CTF - Vol 404 | Connexion</title>
	<link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
	<div class="auth-card">
		<div class="auth-logo">✈️</div>
		<h1 class="auth-title">Vol 404 — CTF</h1>
		<p class="auth-subtitle">Connexion étudiant</p>

		<form id="login-form" class="auth-form" autocomplete="off">
			<div class="form-group">
				<label for="username">Identifiant</label>
				<input type="text" id="username" placeholder="ex : Tyler" autocomplete="username" required>
			</div>
			<div class="form-group">
				<label for="password">Mot de passe</label>
				<input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password" required>
			</div>
			<button type="submit" class="auth-btn">Se connecter</button>
		</form>

		<p class="auth-error" id="error-message"></p>
		<p class="auth-footer-note">Pas encore de compte ? <a href="/register.html">S'inscrire</a></p>
	</div>

	<script>
		window.addEventListener('DOMContentLoaded', () => {
			requestAnimationFrame(() => requestAnimationFrame(() => {
				document.body.classList.add('page-ready');
			}));
		});

		document.getElementById('login-form').addEventListener('submit', async (e) => {
			e.preventDefault();
			const username = document.getElementById('username').value.trim();
			const password = document.getElementById('password').value;
			const errorMsg = document.getElementById('error-message');
			errorMsg.textContent = '';

			try {
				const res = await fetch('/auth/student-login', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ username, password })
				});
				const data = await res.json();
				if (res.ok) { window.location.href = '/'; return; }
				errorMsg.textContent = data.message || 'Connexion impossible.';
			} catch {
				errorMsg.textContent = 'Erreur de connexion au serveur.';
			}
		});
	</script>

	<footer class="app-footer">
		<p>&copy; 2026 Vol404 CTF — Designed by <strong>Yarno Chedemail</strong></p>
	</footer>
</body>
</html>
