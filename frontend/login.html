<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF - Vol 404 | Connexion</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="airline-logo">✈</div>
        <h1>Air France — Vol 404</h1>
        <p class="subtitle">Espace passager — Authentification requise</p>

        <form id="login-form" autocomplete="off">
            <input type="text" class="login-autofill-trap" autocomplete="username" tabindex="-1" aria-hidden="true">
            <input type="password" class="login-autofill-trap" autocomplete="current-password" tabindex="-1" aria-hidden="true">

            <label for="username">Identifiant</label>
            <input type="text" id="username" data-field-name="af404_user" placeholder="ex : Tyler" autocomplete="off" readonly required>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" data-field-name="af404_pass" placeholder="••••••••••••" autocomplete="new-password" readonly required>

            <button type="submit">Embarquer</button>
        </form>

        <p id="error-message"></p>
        <p class="footer-note">AF404 · Départ 14h35</p>
    </div>

    <script>
        const buildFreshField = (fieldId) => {
            const currentField = document.getElementById(fieldId);
            const replacement = document.createElement('input');

            replacement.type = currentField.type;
            replacement.id = currentField.id;
            replacement.placeholder = currentField.placeholder;
            replacement.autocomplete = currentField.autocomplete;
            replacement.required = currentField.required;
            replacement.readOnly = true;
            replacement.dataset.fieldName = currentField.dataset.fieldName;

            replacement.addEventListener('focus', () => {
                replacement.readOnly = false;
                replacement.name = replacement.dataset.fieldName;
            }, { once: true });

            currentField.replaceWith(replacement);
            return replacement;
        };

        const clearLoginFields = () => {
            const usernameField = buildFreshField('username');
            const passwordField = buildFreshField('password');

            document.getElementById('login-form').reset();
            usernameField.value = '';
            passwordField.value = '';
            usernameField.setAttribute('readonly', 'readonly');
            passwordField.setAttribute('readonly', 'readonly');
            usernameField.removeAttribute('name');
            passwordField.removeAttribute('name');
        };

        window.addEventListener('DOMContentLoaded', () => {
            clearLoginFields();
            window.setTimeout(clearLoginFields, 100);
            window.setTimeout(clearLoginFields, 600);

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    document.body.classList.add('page-ready');
                });
            });
        });

        window.addEventListener('pageshow', clearLoginFields);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            errorMsg.textContent = '';

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/home.html';
                } else {
                    // ⚠️ CTF — innerHTML intentionnel : XSS réfléchi possible via le message serveur
                    errorMsg.innerHTML = data.message || 'Identifiants incorrects.';
                }
            } catch (err) {
                errorMsg.textContent = 'Erreur de connexion au serveur.';
            }
        });
    </script>
    <footer class="app-footer">
        <p>&copy; 2026 Vol404 CTF — Designed by <strong>Yarno Chedemail</strong></p>
    </footer>
</body>
</html>
